<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Начало — зачёт УР</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --oz-blue: #005bff;
      --oz-blue-soft: #e8f1ff;
      --oz-bg: #f2f5f9;
      --oz-card: #fff;
      --oz-line: #d6dbe3;
      --oz-text: #001a34;
      --oz-muted: #707f8d;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 4px 16px rgba(0, 26, 52, 0.06);
      font-family: "Inter", system-ui, sans-serif;
      line-height: 1.5;
      color: var(--oz-text);
      font-size: 15px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--oz-bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 100% -20%, rgba(0, 91, 255, 0.08), transparent);
    }
    .ribbon {
      background: linear-gradient(90deg, #001a34 0%, #0a2540 50%, #001a34 100%);
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      padding: 0.45rem 1rem;
      text-align: center;
    }
    .ribbon span { color: #7eb6ff; }
    .shell { max-width: 28rem; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--oz-blue) 0%, #003d99 100%);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 12px rgba(0, 91, 255, 0.35);
    }
    .brand-text small { display: block; font-size: 11px; color: var(--oz-muted); }
    .navtabs {
      display: flex;
      gap: 0.35rem;
      margin: 0 0 1.25rem;
      flex-wrap: wrap;
    }
    .navtabs a {
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: var(--oz-text);
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--oz-line);
      background: #fff;
    }
    .navtabs a:hover { border-color: var(--oz-blue); color: var(--oz-blue); }
    .navtabs a[aria-current="page"] {
      background: var(--oz-blue-soft);
      border-color: rgba(0, 91, 255, 0.35);
      color: var(--oz-blue);
    }
    .card {
      background: var(--oz-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.35rem 1.4rem 1.5rem;
      border: 1px solid rgba(0, 26, 52, 0.06);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; }
    .lead { margin: 0 0 1.25rem; color: var(--oz-muted); font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--oz-muted); margin-bottom: 0.35rem; }
    input[type=text] {
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--oz-line);
      border-radius: var(--radius-sm);
      font: inherit;
      margin-bottom: 1.25rem;
    }
    input[type=text]:focus {
      outline: none;
      border-color: var(--oz-blue);
      box-shadow: 0 0 0 3px rgba(0, 91, 255, 0.2);
    }
    button[type=submit] {
      width: 100%;
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, var(--oz-blue) 0%, #0046c7 100%);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 91, 255, 0.35);
    }
    button[type=submit]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }
    button[type=submit]:not(:disabled):hover { filter: brightness(1.05); }
    .flash {
      background: #fff8e6;
      border: 1px solid #f0c040;
      color: #6a5200;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="ribbon">Шаг 1 из 2 · <span>после «Начать» откроется вариант теста</span></div>
  <div class="shell">
    <a class="brand" href="{% url 'quiz_landing' %}">
      <span class="brand-mark">УР</span>
      <span class="brand-text">
        <strong>Кабинет зачёта</strong>
        <small>Управление разработкой</small>
      </span>
    </a>
    <nav class="navtabs" aria-label="Разделы">
      <a href="{% url 'quiz_landing' %}" aria-current="page">Начало</a>
      <a href="{% url 'quiz_stats' %}">Статистика</a>
    </nav>

    {% if flash %}
    <div class="flash" role="alert">{{ flash }}</div>
    {% endif %}

    <div class="card">
      <h1>Перед началом теста</h1>
      <form method="post" action="{% url 'quiz_start' %}" id="start-form">
        {% csrf_token %}
        <label for="id_surname">Фамилия,инициалы, группа</label>
        <input type="text" name="surname" id="id_surname" maxlength="200" autocomplete="family-name" placeholder="Например, Иванов">
        <button type="submit" id="btn-start" disabled>Начать тест</button>
      </form>
    </div>
  </div>
  <script>
  (function () {
    var inp = document.getElementById("id_surname");
    var btn = document.getElementById("btn-start");
    function sync() {
      btn.disabled = !inp.value.trim();
    }
    inp.addEventListener("input", sync);
    inp.addEventListener("change", sync);
    sync();
  })();
  </script>
  <script>
  (function () {
    var pingUrl = "{% url 'quiz_presence_ping' %}";
    function clientId() {
      var k = "ur_stats_cid";
      try {
        var x = localStorage.getItem(k);
        if (!x) {
          x = (typeof crypto !== "undefined" && crypto.randomUUID)
            ? crypto.randomUUID()
            : String(Date.now()) + "-" + Math.random().toString(16).slice(2);
          localStorage.setItem(k, x);
        }
        return x;
      } catch (e) {
        return "anon-" + String(Date.now());
      }
    }
    function ping() {
      var u = pingUrl + "?cid=" + encodeURIComponent(clientId()) + "&v=&p=landing";
      fetch(u, { credentials: "same-origin" }).catch(function () {});
    }
    ping();
    setInterval(ping, 8000);
  })();
  </script>
</body>
</html>
