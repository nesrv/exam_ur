<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Статистика — зачёт УР</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --oz-blue: #005bff;
      --oz-blue-soft: #e8f1ff;
      --oz-bg: #f2f5f9;
      --oz-card: #fff;
      --oz-line: #d6dbe3;
      --oz-text: #001a34;
      --oz-muted: #707f8d;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 4px 16px rgba(0, 26, 52, 0.06);
      font-family: "Inter", system-ui, sans-serif;
      line-height: 1.5;
      color: var(--oz-text);
      font-size: 15px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--oz-bg);
      background-image:
        radial-gradient(ellipse 100% 50% at 80% -10%, rgba(0, 91, 255, 0.07), transparent);
    }
    .ribbon {
      background: linear-gradient(90deg, #001a34 0%, #0a2540 100%);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      padding: 0.45rem 1rem;
      text-align: center;
    }
    .ribbon span { color: #7eb6ff; }
    .shell { max-width: 36rem; margin: 0 auto; padding: 1.25rem 1rem 2rem; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: inherit;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--oz-blue) 0%, #003d99 100%);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 12px rgba(0, 91, 255, 0.35);
    }
    .brand-text small { display: block; font-size: 11px; color: var(--oz-muted); }
    .pill {
      font-size: 12px;
      font-weight: 600;
      color: var(--oz-blue);
      background: var(--oz-blue-soft);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 91, 255, 0.15);
    }
    .navtabs {
      display: flex;
      gap: 0.35rem;
      margin: 0 0 1.25rem;
      flex-wrap: wrap;
    }
    .navtabs a {
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: var(--oz-text);
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--oz-line);
      background: #fff;
    }
    .navtabs a:hover { border-color: var(--oz-blue); color: var(--oz-blue); }
    .navtabs a[aria-current="page"] {
      background: var(--oz-blue-soft);
      border-color: rgba(0, 91, 255, 0.35);
      color: var(--oz-blue);
    }
    h1 { margin: 0 0 1rem; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .row {
      background: var(--oz-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem 1.2rem 1.15rem;
      margin-bottom: 0.85rem;
      border: 1px solid rgba(0, 26, 52, 0.06);
    }
    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.65rem;
    }
    .row-head strong { font-size: 1rem; }
    .row-head strong.muted { color: var(--oz-muted); font-weight: 600; }
    .row-head .sub { font-size: 13px; color: var(--oz-muted); font-weight: 500; }
    .bar-wrap {
      height: 10px;
      border-radius: 999px;
      background: var(--oz-line);
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--oz-blue), #0046c7);
      transition: width 0.35s ease;
      min-width: 0;
    }
    .bar-meta { font-size: 12px; color: var(--oz-muted); margin-bottom: 0.5rem; }
    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      font-size: 14px;
    }
    .metrics span { color: var(--oz-muted); }
    .metrics b { font-weight: 600; color: var(--oz-text); }
    .badge-live {
      font-size: 11px;
      font-weight: 600;
      color: #0a6b3d;
      background: #d6f5e6;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      margin-left: 0.35rem;
      vertical-align: middle;
    }
    .copy-emoji {
      font-size: 1.15rem;
      line-height: 1;
      margin-left: 0.35rem;
      vertical-align: -0.1em;
    }
  </style>
</head>
<body>
  <div class="ribbon">Обновление каждые 2 с · <span>живой прогресс (форма) и последние сдачи</span></div>
  <div class="shell">
    <div class="topbar">
      <a class="brand" href="{% url 'quiz_landing' %}">
        <span class="brand-mark">УР</span>
        <span class="brand-text">
          <strong>Кабинет зачёта</strong>
          <small>Управление разработкой</small>
        </span>
      </a>
      <span class="pill" id="pill-updated">—</span>
    </div>
    <nav class="navtabs" aria-label="Разделы">
      <a href="{% url 'quiz_landing' %}">Начало</a>
      <a href="{% url 'quiz_test' %}">Вопросы</a>
      <a href="{% url 'quiz_stats' %}" aria-current="page">Статистика</a>
    </nav>

    <h1>Статистика</h1>

    <div id="rows"></div>
  </div>

  {{ initial|json_script:"ur-stats-initial" }}
  <script>
  (function () {
    var apiUrl = "{% url 'quiz_stats_api' %}";
    var pingUrl = "{% url 'quiz_presence_ping' %}";
    function clientId() {
      var k = "ur_stats_cid";
      try {
        var x = localStorage.getItem(k);
        if (!x) {
          x = (typeof crypto !== "undefined" && crypto.randomUUID)
            ? crypto.randomUUID()
            : String(Date.now()) + "-" + Math.random().toString(16).slice(2);
          localStorage.setItem(k, x);
        }
        return x;
      } catch (e) {
        return "anon-" + String(Date.now());
      }
    }
    function ping() {
      var u = pingUrl + "?cid=" + encodeURIComponent(clientId()) + "&v=&p=stats";
      fetch(u, { credentials: "same-origin" }).catch(function () {});
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    }
    function render(d) {
      var host = document.getElementById("rows");
      host.innerHTML = "";
      (d.students || []).forEach(function (s) {
        var pct = s.total ? Math.round((100 * s.filled) / s.total) : 0;
        var row = document.createElement("div");
        row.className = "row";
        var sub = (s.subtitle || "").trim();
        var title = sub
          ? "<strong>" + escapeHtml(sub) + "</strong>"
          : "<strong class=\"muted\">—</strong>";
        var live = s.live ? "<span class=\"badge-live\" title=\"Ответы ещё не отправлены\">онлайн</span>" : "";
        var cc = typeof s.clipboard_count === "number" && !isNaN(s.clipboard_count) ? s.clipboard_count : 0;
        var copyMark = cc > 0
          ? "<span class=\"copy-emoji\" title=\"Копирований с экрана теста: " + cc + "\" aria-label=\"Копирований: " + cc + "\">📋</span>"
          : "";
        row.innerHTML =
          "<div class=\"row-head\">" + title + copyMark + live + "</div>" +
          "<div class=\"bar-meta\">Ответов заполнено: <b>" + s.filled + "</b> из " + s.total +
          " · Копирований: <b>" + cc + "</b></div>" +
          "<div class=\"bar-wrap\" role=\"progressbar\" aria-valuemin=\"0\" aria-valuemax=\"" + s.total +
          "\" aria-valuenow=\"" + s.filled + "\" aria-label=\"Заполнено ответов\">" +
          "<div class=\"bar-fill\" style=\"width:" + pct + "%\"></div></div>" +
          "<div class=\"metrics\">" +
          "<div><span>Результат</span> · <b>" + escapeHtml(String(s.result)) + "</b></div>" +
          "<div><span>Оценка</span> · <b>" + escapeHtml(String(s.grade)) + "</b> <small style=\"color:var(--oz-muted)\">(ч.4)</small></div>" +
          "<div><span>Оценка за зачёт</span> · <b>" + escapeHtml(String(s.mark_five != null && s.mark_five !== undefined ? s.mark_five : "—")) + "</b>" +
          (s.scale_pct != null
            ? " <small style=\"color:var(--oz-muted)\" title=\"Доля от макс. баллов (15 или 20)\">(" + s.scale_pct + "%)</small>"
            : "") +
          "</div>" +
          "</div>";
        host.appendChild(row);
      });
      document.getElementById("pill-updated").textContent =
        "обновлено " + (d.server_time || "").replace("T", " ");
    }
    var initial = {};
    try {
      initial = JSON.parse(document.getElementById("ur-stats-initial").textContent);
    } catch (e) {}
    render(initial);
    function tick() {
      fetch(apiUrl, { credentials: "same-origin" })
        .then(function (r) { return r.json(); })
        .then(render)
        .catch(function () {});
    }
    ping();
    setInterval(ping, 8000);
    setInterval(tick, 2000);
  })();
  </script>
</body>
</html>
